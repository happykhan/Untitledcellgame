<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d2a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd060" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e8d0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e8d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff44bb" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ff44bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aa55ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#aa55ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#1a1a3a" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Bioluminescent patches -->
  <circle cx="300" cy="200" r="140" fill="url(#glow2)" opacity="0.7"/>
  <circle cx="900" cy="420" r="160" fill="url(#glow3)" opacity="0.6"/>
  <circle cx="650" cy="120" r="100" fill="url(#glow4)" opacity="0.5"/>
  <circle cx="150" cy="500" r="90"  fill="url(#glow1)" opacity="0.45"/>

  <!-- Player cell — gold rod, centre-right, tilted -->
  <g transform="translate(700, 315) rotate(-25)">
    <ellipse cx="0" cy="0" rx="22" ry="90" fill="none" stroke="#ffd060" stroke-width="60" stroke-opacity="0.04"/>
    <ellipse cx="0" cy="0" rx="22" ry="90" fill="#7a4000" fill-opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="16" ry="66" fill="#180c00" fill-opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="9"  ry="27" fill="#ff9900" fill-opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="22" ry="90" fill="none" stroke="#ffd060" stroke-width="2"/>
    <ellipse cx="0" cy="0" rx="22" ry="90" fill="none" stroke="#ffee99" stroke-width="3.5" stroke-opacity="0.22"/>
    <!-- Flagellum trailing -->
    <path d="M0,90 Q-18,120 -8,150 Q8,180 -4,210" fill="none" stroke="#ffd060" stroke-width="1.2" stroke-opacity="0.7"/>
    <path d="M0,90 Q12,115 4,148 Q-10,178 6,208" fill="none" stroke="#ffd060" stroke-width="0.7" stroke-opacity="0.45"/>
  </g>

  <!-- Cyan coccus — left area -->
  <g transform="translate(280, 240)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#00e8d0" stroke-width="80" stroke-opacity="0.03"/>
    <circle cx="0" cy="0" r="42" fill="#004444" fill-opacity="0.5"/>
    <circle cx="0" cy="0" r="31" fill="#001616" fill-opacity="0.88"/>
    <circle cx="0" cy="0" r="20" fill="#00ffcc" fill-opacity="0.18"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#00e8d0" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#88ffee" stroke-width="3" stroke-opacity="0.2"/>
  </g>

  <!-- Rose/magenta vibrio — top right -->
  <g transform="translate(950, 200)">
    <path d="M-50,-30 Q0,10 50,-20" fill="none" stroke="#ff44bb" stroke-width="28" stroke-opacity="0.5" stroke-linecap="round"/>
    <path d="M-50,-30 Q0,10 50,-20" fill="none" stroke="#1e000e" stroke-width="18" stroke-opacity="0.88" stroke-linecap="round"/>
    <path d="M-50,-30 Q0,10 50,-20" fill="none" stroke="#ff44bb" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M-50,-30 Q0,10 50,-20" fill="none" stroke="#ff99dd" stroke-width="3" stroke-opacity="0.22" stroke-linecap="round"/>
    <!-- Flagellum -->
    <path d="M50,-20 Q80,-5 70,25 Q55,50 80,65" fill="none" stroke="#ff44bb" stroke-width="0.9" stroke-opacity="0.65"/>
  </g>

  <!-- Purple filament — bottom left -->
  <g transform="translate(180, 480) rotate(15)">
    <ellipse cx="0" cy="0" rx="6" ry="80" fill="none" stroke="#aa55ff" stroke-width="20" stroke-opacity="0.04"/>
    <ellipse cx="0" cy="0" rx="6" ry="80" fill="#330055" fill-opacity="0.55"/>
    <ellipse cx="0" cy="0" rx="4" ry="58" fill="#0e001c" fill-opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="6" ry="80" fill="none" stroke="#aa55ff" stroke-width="1.4"/>
  </g>

  <!-- Lime short coccobacillus — bottom right -->
  <g transform="translate(1020, 490) rotate(-10)">
    <ellipse cx="0" cy="0" rx="20" ry="28" fill="none" stroke="#55ff88" stroke-width="40" stroke-opacity="0.04"/>
    <ellipse cx="0" cy="0" rx="20" ry="28" fill="#004422" fill-opacity="0.52"/>
    <ellipse cx="0" cy="0" rx="14" ry="20" fill="#001308" fill-opacity="0.88"/>
    <ellipse cx="0" cy="0" rx="20" ry="28" fill="none" stroke="#55ff88" stroke-width="1.8"/>
  </g>

  <!-- Food particles -->
  <circle cx="450" cy="380" r="8" fill="#ff8800" fill-opacity="0.85"/>
  <circle cx="450" cy="380" r="12" fill="none" stroke="#ff8800" stroke-width="3" stroke-opacity="0.35"/>
  <circle cx="820" cy="160" r="7" fill="#ff8800" fill-opacity="0.8"/>
  <circle cx="820" cy="160" r="11" fill="none" stroke="#ff8800" stroke-width="2.5" stroke-opacity="0.3"/>
  <circle cx="560" cy="500" r="6" fill="#ff8800" fill-opacity="0.75"/>

  <!-- Gene pickup diamond -->
  <g transform="translate(380, 470)">
    <polygon points="0,-18 16,0 0,12 -16,0" fill="#ffd060" fill-opacity="0.12"/>
    <polygon points="0,-18 16,0 0,12 -16,0" fill="none" stroke="#ffd060" stroke-width="1.8"/>
    <polygon points="0,-18 16,0 0,12 -16,0" fill="none" stroke="#ffd060" stroke-width="8" stroke-opacity="0.08"/>
  </g>

  <!-- Predator hint — large red blob top-left -->
  <g transform="translate(100, 130)">
    <ellipse cx="0" cy="0" rx="62" ry="50" fill="none" stroke="#ff2200" stroke-width="100" stroke-opacity="0.025"/>
    <ellipse cx="0" cy="0" rx="62" ry="50" fill="#180000" fill-opacity="0.88"/>
    <circle  cx="0" cy="0" r="18"  fill="#330000" fill-opacity="0.88"/>
    <circle  cx="0" cy="0" r="12"  fill="#ff6600" fill-opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="62" ry="50" fill="none" stroke="#ff2200" stroke-width="2.2"/>
    <ellipse cx="0" cy="0" rx="62" ry="50" fill="none" stroke="#ff8866" stroke-width="4" stroke-opacity="0.18"/>
  </g>

  <!-- Title -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace, Courier New" font-size="52" font-weight="bold" fill="#ffd060" opacity="0.95">UNTITLED CELL GAME</text>
  <text x="600" y="595" text-anchor="middle" font-family="monospace, Courier New" font-size="18" fill="#aaccbb" opacity="0.75">survive · eat · evolve · divide</text>
</svg>
